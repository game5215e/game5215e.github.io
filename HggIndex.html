<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>華德夏令營 倒數計時</title>
    <style>
        /* 基礎設定與深色背景 */
        :root {
            --bg-top: #101935;
            --bg-bottom: #04070f;
            --text-main: #ffffff;
            --text-muted: #8a94a6;
            --accent-color: #4ade80; /* 勾選後的極光綠色 */
            --border-color: rgba(255, 255, 255, 0.15);
        }
        
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
            color: var(--text-main);
            font-family: 'PingFang TC', 'Helvetica Neue', 'Microsoft JhengHei', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 480px;
            padding: 40px 30px;
            box-sizing: border-box;
            text-align: center;
        }

        /* 頂部資訊區塊 */
        h1.main-title {
            font-size: 42px;
            font-weight: 300;
            margin: 0 0 15px 0;
            letter-spacing: 3px;
        }

        .date-info {
            font-size: 16px;
            color: var(--text-muted);
            letter-spacing: 2px;
        }

        .divider {
            height: 1px;
            background-color: var(--border-color);
            margin: 35px 0;
        }

        /* 倒數計時區塊 */
        .countdown-title {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .timer-display {
            font-size: 36px;
            font-weight: 200;
            letter-spacing: 2px;
            margin: 25px 0;
            color: #ffffff;
        }

        /* 地點資訊 */
        .action-text {
            font-size: 18px;
            color: #ffffff;
            margin-top: 20px;
            letter-spacing: 1px;
        }

        /* 可勾選互動清單區塊 */
        .checklist-container {
            text-align: left;
            margin-top: 40px;
        }

        .checklist-title {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 20px;
            letter-spacing: 1px;
            border-left: 2px solid var(--text-muted);
            padding-left: 8px;
        }

        .todo-item {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        /* 隱藏預設的 checkbox */
        .todo-item input[type="checkbox"] {
            display: none;
        }

        /* 客製化核取方塊的外框 */
        .custom-checkbox {
            width: 18px;
            height: 18px;
            border: 1px solid var(--text-muted);
            border-radius: 4px;
            margin-right: 15px;
            display: inline-block;
            position: relative;
            flex-shrink: 0;
        }

        .todo-text {
            font-size: 16px;
            color: var(--text-main);
            transition: all 0.2s ease;
        }

        /* 當被勾選時的樣式變化 */
        .todo-item input[type="checkbox"]:checked + .custom-checkbox {
            background-color: var(--accent-color);
            border-color: var(--accent-color);
        }

        /* 勾選打勾符號 */
        .todo-item input[type="checkbox"]:checked + .custom-checkbox::after {
            content: '';
            position: absolute;
            left: 5px;
            top: 2px;
            width: 5px;
            height: 9px;
            border: solid #04070f;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }

        .todo-item input[type="checkbox"]:checked ~ .todo-text {
            color: var(--accent-color);
            text-decoration: line-through;
            opacity: 0.7;
        }

        /* 注意事項框樣式 */
        .alert-card {
            border: 1px solid rgba(239, 68, 68, 0.4); /* 暗紅色微透邊框 */
            border-radius: 12px;
            padding: 22px;
            margin-top: 45px;
            background: rgba(239, 68, 68, 0.04); /* 微弱的紅光背景 */
            text-align: left;
        }

        .alert-title {
            font-size: 14px;
            color: #ef4444; /* 警示紅色 */
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            letter-spacing: 1px;
        }

        .alert-content {
            font-size: 14px;
            color: #e2e8f0;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="main-title">華德夏令營</h1>
        <div class="date-info">2026 / 8 / 1</div>

        <div class="divider"></div>

        <div class="countdown-title">距離夏令營開始還有</div>
        <div class="timer-display" id="timer">00天 00:00:00</div>
        
        <div class="divider"></div>

        <div class="action-text">📍 華德寶宮集合</div>

        <div class="checklist-container">
            <div class="checklist-title">個人行李檢查清單</div>
            
            <label class="todo-item">
                <input type="checkbox">
                <span class="custom-checkbox"></span>
                <span class="todo-text">1. 棉被</span>
            </label>

            <label class="todo-item">
                <input type="checkbox">
                <span class="custom-checkbox"></span>
                <span class="todo-text">2. 水壺</span>
            </label>

            <label class="todo-item">
                <input type="checkbox">
                <span class="custom-checkbox"></span>
                <span class="todo-text">3. 枕頭</span>
            </label>

            <label class="todo-item">
                <input type="checkbox">
                <span class="custom-checkbox"></span>
                <span class="todo-text">4. 牙刷</span>
            </label>

            <label class="todo-item">
                <input type="checkbox">
                <span class="custom-checkbox"></span>
                <span class="todo-text">5. 牙膏</span>
            </label>
        </div>

        <div class="alert-card">
            <div class="alert-title">⚠️ 注意事項</div>
            <div class="alert-content">
                禁止攜帶電子設備（包含電子手錶，通訊各項設備）。
            </div>
        </div>
    </div>

    <script>
        // 設定目標時間為 2026年8月1日 00:00:00
        const targetDate = new Date('2026-08-01T00:00:00').getTime();

        function updateTimer() {
            const now = new Date().getTime();
            const diff = targetDate - now;

            // 如果時間到了
            if (diff <= 0) {
                document.getElementById('timer').innerText = "華德夏令營正式開始！";
                return;
            }

            // 計算天、時、分、秒
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            let hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            let minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            let seconds = Math.floor((diff % (1000 * 60)) / 1000);

            // 補零
            hours = String(hours).padStart(2, '0');
            minutes = String(minutes).padStart(2, '0');
            seconds = String(seconds).padStart(2, '0');

            // 渲染到網頁上
            document.getElementById('timer').innerText = `${days}天 ${hours}:${minutes}:${seconds}`;
        }

        // 立即執行一次，然後每秒更新一次
        updateTimer();
        setInterval(updateTimer, 1000);
    </script>
</body>
</html>
