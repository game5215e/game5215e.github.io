<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>華德夏令營 倒數計時</title>
    <style>
        /* 基礎設定與深色背景 */
        :root {
            --bg-top: #101935;
            --bg-bottom: #04070f;
            --text-main: #ffffff;
            --text-muted: #8a94a6;
            --border-color: rgba(255, 255, 255, 0.15);
        }
        
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
            color: var(--text-main);
            font-family: 'PingFang TC', 'Helvetica Neue', 'Microsoft JhengHei', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center; /* 讓內容垂直居中 */
        }

        .container {
            width: 100%;
            max-width: 480px;
            padding: 40px 30px;
            box-sizing: border-box;
            text-align: center; /* 文字置中 */
        }

        /* 頂部資訊區塊 */
        h1.main-title {
            font-size: 42px;
            font-weight: 300;
            margin: 0 0 15px 0;
            letter-spacing: 3px;
        }

        .date-info {
            font-size: 16px;
            color: var(--text-muted);
            letter-spacing: 2px;
        }

        .divider {
            height: 1px;
            background-color: var(--border-color);
            margin: 35px 0;
        }

        /* 倒數計時區塊 */
        .countdown-title {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .timer-display {
            font-size: 36px;
            font-weight: 200;
            letter-spacing: 2px;
            margin: 25px 0;
            color: #ffffff;
        }

        /* 地點資訊 */
        .action-text {
            font-size: 18px;
            color: #ffffff;
            margin-top: 20px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="main-title">華德夏令營</h1>
        <div class="date-info">2026 / 8 / 1</div>

        <div class="divider"></div>

        <div class="countdown-title">距離夏令營開始還有</div>
        <div class="timer-display" id="timer">00天 00:00:00</div>
        
        <div class="divider"></div>

        <div class="action-text">📍 華德寶宮集合</div>
    </div>

    <script>
        // 設定目標時間為 2026年8月1日 00:00:00
        const targetDate = new Date('2026-08-01T00:00:00').getTime();

        function updateTimer() {
            const now = new Date().getTime();
            const diff = targetDate - now;

            // 如果時間到了
            if (diff <= 0) {
                document.getElementById('timer').innerText = "華德夏令營正式開始！";
                return;
            }

            // 計算天、時、分、秒
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            let hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            let minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            let seconds = Math.floor((diff % (1000 * 60)) / 1000);

            // 補零 (讓 9 變成 09)
            hours = String(hours).padStart(2, '0');
            minutes = String(minutes).padStart(2, '0');
            seconds = String(seconds).padStart(2, '0');

            // 渲染到網頁上
            document.getElementById('timer').innerText = `${days}天 ${hours}:${minutes}:${seconds}`;
        }

        // 立即執行一次，然後每秒更新一次
        updateTimer();
        setInterval(updateTimer, 1000);
    </script>
</body>
</html>
